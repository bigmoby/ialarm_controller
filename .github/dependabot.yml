version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day-of-week: "monday"
      time: "09:00"
    open-pull-requests-limit: 10

  # Enable version updates for pip
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day-of-week: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "bigmoby"
    assignees:
      - "bigmoby"
    commit-message:
      prefix: "deps"
      include: "scope"
